<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모드파티 주문 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f4f4f5;--white:#fff;--g50:#fafafa;--g100:#f0f0f0;--g200:#e4e4e7;--g300:#d1d1d6;
  --g400:#a1a1aa;--g500:#71717a;--g700:#3f3f46;--g900:#18181b;
  --male:#3b6fc4;--mlight:#dbeafe;--female:#b5506a;--flight:#fce7ef;
  --border:#e4e4e7;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.07);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--g900);font-size:13px;line-height:1.5;}
.layout{display:flex;min-height:100vh;}
aside{width:240px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10;display:flex;flex-direction:column;}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sb-logo{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--g400);text-transform:uppercase;margin-bottom:3px;}
.sb-title{font-size:15px;font-weight:700;}
.sb-sec{padding:14px 18px;border-bottom:1px solid var(--border);}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g400);margin-bottom:10px;}
.date-row{display:flex;flex-direction:column;gap:6px;}
.date-row label{font-size:11px;color:var(--g500);margin-bottom:2px;display:block;}
input[type=date]{width:100%;padding:6px 9px;border:1px solid var(--g200);border-radius:6px;font-size:12px;font-family:inherit;color:var(--g900);background:var(--g50);outline:none;}
input[type=date]:focus{border-color:var(--g400);background:white;}
.quick-row{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.qbtn{padding:3px 8px;border:1px solid var(--g200);border-radius:20px;font-size:11px;font-family:inherit;color:var(--g500);background:white;cursor:pointer;transition:all .15s;}
.qbtn:hover{border-color:var(--g400);color:var(--g700);}
.qbtn.on{border-color:var(--g900);background:var(--g900);color:white;}
.gender-row{display:flex;gap:5px;}
.gbtn{flex:1;padding:6px 0;border:1px solid var(--g200);border-radius:6px;font-size:12px;font-family:inherit;color:var(--g500);background:white;cursor:pointer;font-weight:500;transition:all .15s;}
.gbtn:hover{border-color:var(--g300);color:var(--g700);}
.gbtn.am{border-color:var(--male);background:var(--mlight);color:var(--male);}
.gbtn.af{border-color:var(--female);background:var(--flight);color:var(--female);}
.gbtn.aa{border-color:var(--g900);background:var(--g900);color:white;}
.chk-list{display:flex;flex-direction:column;gap:4px;}
.chk-item{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 0;}
.chk-item input{display:none;}
.chk-box{width:15px;height:15px;border:1.5px solid var(--g300);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.chk-item input:checked+.chk-box{background:var(--g900);border-color:var(--g900);}
.chk-item input:checked+.chk-box::after{content:'';display:block;width:4px;height:7px;border:1.5px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);}
.chk-lbl{font-size:12px;color:var(--g700);}
.chk-cnt{margin-left:auto;font-size:11px;color:var(--g400);}
.rchips{display:flex;flex-wrap:wrap;gap:4px;}
.rchip{padding:3px 8px;border:1px solid var(--g200);border-radius:20px;font-size:11px;color:var(--g500);background:white;cursor:pointer;transition:all .15s;user-select:none;}
.rchip:hover{border-color:var(--g400);color:var(--g700);}
.rchip.on{border-color:var(--g900);background:var(--g900);color:white;}
.rall-btn{width:100%;padding:5px;border:1px solid var(--g200);border-radius:6px;font-size:11px;font-family:inherit;color:var(--g500);background:white;cursor:pointer;margin-bottom:6px;transition:all .15s;}
.rall-btn:hover{border-color:var(--g400);}
.sb-sum{padding:14px 18px;margin-top:auto;background:var(--g50);border-top:1px solid var(--border);}
.sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sum-row:last-child{margin-bottom:0;}
.sum-k{font-size:11px;color:var(--g400);}
.sum-v{font-size:13px;font-weight:700;}
.sum-v.m{color:var(--male);}
.sum-v.f{color:var(--female);}
main{margin-left:240px;flex:1;padding:24px 24px 48px;min-width:0;}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.page-title{font-size:18px;font-weight:700;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{padding:3px 9px;background:white;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--g500);}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.kpi-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);margin-bottom:6px;}
.kpi-val{font-size:30px;font-weight:700;line-height:1;}
.kpi-val.m{color:var(--male);}
.kpi-val.f{color:var(--female);}
.kpi-sub{font-size:11px;color:var(--g400);margin-top:4px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.panel{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.panel.full{grid-column:1/-1;}
.panel-title{font-size:10px;font-weight:700;color:var(--g400);margin-bottom:14px;letter-spacing:.08em;text-transform:uppercase;}
/* butterfly */
.bfhdr{display:grid;grid-template-columns:64px 1fr 1fr;font-size:10px;color:var(--g400);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.bfhdr .lg{text-align:center;}
.bfhdr .lm{text-align:right;padding-right:8px;color:var(--male);}
.bfhdr .lf{text-align:left;padding-left:8px;color:var(--female);}
.bfrow{display:grid;grid-template-columns:64px 1fr 1fr;align-items:center;margin-bottom:8px;}
.bfage{font-size:11px;font-weight:500;color:var(--g500);text-align:center;}
.bfleft{display:flex;align-items:center;justify-content:flex-end;gap:5px;border-right:1px solid var(--g100);padding-right:3px;}
.bfright{display:flex;align-items:center;justify-content:flex-start;gap:5px;padding-left:3px;}
.bm{height:19px;background:var(--male);opacity:.75;border-radius:3px 0 0 3px;transition:width .6s cubic-bezier(.16,1,.3,1);}
.bf{height:19px;background:var(--female);opacity:.75;border-radius:0 3px 3px 0;transition:width .6s cubic-bezier(.16,1,.3,1);}
.bn{font-size:11px;font-weight:600;}
.bn.m{color:var(--male);}
.bn.f{color:var(--female);}
.bn.z{color:var(--g300);}
/* stacked */
.scrow{margin-bottom:11px;}
.scrow:last-child{margin-bottom:0;}
.sctop{display:flex;justify-content:space-between;margin-bottom:4px;}
.scage{font-size:12px;font-weight:500;color:var(--g700);}
.sctot{font-size:11px;color:var(--g400);}
.scbar{height:15px;background:var(--g100);border-radius:3px;overflow:hidden;display:flex;}
.scm{height:100%;background:var(--male);opacity:.7;transition:width .6s cubic-bezier(.16,1,.3,1);}
.scf{height:100%;background:var(--female);opacity:.7;transition:width .6s cubic-bezier(.16,1,.3,1);}
.scprow{display:flex;justify-content:space-between;margin-top:2px;}
.scpct{font-size:10px;}
.scpct.m{color:var(--male);}
.scpct.f{color:var(--female);}
/* region bars */
.rbrow{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.rbrow:last-child{margin-bottom:0;}
.rbname{font-size:11px;font-weight:500;color:var(--g500);width:34px;text-align:right;flex-shrink:0;}
.rbbars{flex:1;display:flex;flex-direction:column;gap:2px;}
.rbm{height:7px;background:var(--male);opacity:.75;border-radius:2px;transition:width .6s cubic-bezier(.16,1,.3,1);}
.rbf{height:7px;background:var(--female);opacity:.75;border-radius:2px;transition:width .6s cubic-bezier(.16,1,.3,1);}
.rbcnt{font-size:10px;color:var(--g400);width:26px;flex-shrink:0;}
/* trend */
.trendwrap{height:130px;position:relative;}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);padding:7px 10px;text-align:left;border-bottom:2px solid var(--g100);}
.tbl th.r{text-align:right;}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--g100);color:var(--g700);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--g50);}
.tbl td.age{font-weight:600;color:var(--g900);}
.tbl td.r{text-align:right;}
.tbl td.mv{text-align:right;font-weight:600;color:var(--male);}
.tbl td.fv{text-align:right;font-weight:600;color:var(--female);}
.ratw{min-width:90px;}
.rattxt{font-size:10px;color:var(--g400);}
.ratbar{height:3px;background:var(--g100);border-radius:2px;overflow:hidden;margin-top:3px;}
.ratfill{height:100%;background:linear-gradient(90deg,var(--male),var(--female));border-radius:2px;}
.legend{display:flex;gap:14px;margin-bottom:12px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g500);}
.ldot{width:8px;height:8px;border-radius:2px;}
canvas{display:block;}
</style>
</head>
<body>
<div class="layout">
<aside>
  <div class="sb-top"><div class="sb-logo">Mod Party</div><div class="sb-title">주문 분석 대시보드</div></div>
  <div class="sb-sec">
    <div class="sec-lbl">기간 설정</div>
    <div class="date-row">
      <div><label>시작일</label><input type="date" id="dateFrom" value="2026-03-11"></div>
      <div><label>종료일</label><input type="date" id="dateTo" value="2026-03-19"></div>
    </div>
    <div class="quick-row">
      <button class="qbtn" data-r="3">최근 3일</button>
      <button class="qbtn" data-r="7">최근 7일</button>
      <button class="qbtn on" data-r="all">전체</button>
    </div>
  </div>
  <div class="sb-sec">
    <div class="sec-lbl">성별</div>
    <div class="gender-row">
      <button class="gbtn aa" id="gAll">전체</button>
      <button class="gbtn" id="gMale">남성</button>
      <button class="gbtn" id="gFemale">여성</button>
    </div>
  </div>
  <div class="sb-sec">
    <div class="sec-lbl">연령대</div>
    <div class="chk-list" id="ageChecks"></div>
  </div>
  <div class="sb-sec">
    <div class="sec-lbl">지역</div>
    <button class="rall-btn" id="rAllBtn">전체 선택 / 해제</button>
    <div class="rchips" id="rChips"></div>
  </div>
  <div class="sb-sum" id="sbSum"></div>
</aside>

<main>
  <div class="mhdr"><div class="page-title">주문 현황</div><div class="tags" id="ftags"></div></div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-lbl">총 주문</div><div class="kpi-val" id="kTot">—</div><div class="kpi-sub" id="kTotSub">—</div></div>
    <div class="kpi-card"><div class="kpi-lbl">남성</div><div class="kpi-val m" id="kM">—</div><div class="kpi-sub" id="kMp">—</div></div>
    <div class="kpi-card"><div class="kpi-lbl">여성</div><div class="kpi-val f" id="kF">—</div><div class="kpi-sub" id="kFp">—</div></div>
    <div class="kpi-card"><div class="kpi-lbl">최다 지역</div><div class="kpi-val" id="kReg" style="font-size:20px;padding-top:4px">—</div><div class="kpi-sub" id="kRegS">—</div></div>
  </div>
  <div class="row3">
    <div class="panel">
      <div class="panel-title">연령대별 남·여</div>
      <div class="bfhdr"><div class="lg">연령대</div><div class="lm">← 남성</div><div class="lf">여성 →</div></div>
      <div id="bf"></div>
    </div>
    <div class="panel">
      <div class="panel-title">연령대별 비율</div>
      <div id="sc"></div>
    </div>
    <div class="panel">
      <div class="panel-title">지역별 주문</div>
      <div class="legend"><div class="leg"><div class="ldot" style="background:var(--male)"></div>남성</div><div class="leg"><div class="ldot" style="background:var(--female)"></div>여성</div></div>
      <div id="rb"></div>
    </div>
  </div>
  <div class="panel full" style="margin-bottom:12px;">
    <div class="panel-title">일별 주문 추이</div>
    <div class="trendwrap"><canvas id="tc"></canvas></div>
  </div>
  <div class="panel full">
    <div class="panel-title">연령대 상세</div>
    <table class="tbl"><thead><tr><th>연령대</th><th class="r">남성</th><th class="r">여성</th><th class="r">합계</th><th>비율</th></tr></thead><tbody id="tbody"></tbody></table>
  </div>
</main>
</div>

const AGS=[
  {l:'82~84년생',n:1982,x:1984},{l:'85~87년생',n:1985,x:1987},{l:'88~90년생',n:1988,x:1990},
  {l:'91~93년생',n:1991,x:1993},{l:'94~96년생',n:1994,x:1996},{l:'97~99년생',n:1997,x:1999},{l:'00~02년생',n:2000,x:2002}
];
const REGS=['압구정','이태원','청담','역삼','부산','대구','대전','천안','광주','울산','인천','수원'];

let S={from:'2026-03-11',to:'2026-03-19',gender:'all',ages:new Set(AGS.map(g=>g.l)),regs:new Set(REGS)};

function gl(by){for(const g of AGS)if(by>=g.n&&by<=g.x)return g.l;return null;}
function gf(){return RAW.filter(r=>{
  if(r.date<S.from||r.date>S.to)return false;
  if(S.gender==='남'&&r.gender!=='남')return false;
  if(S.gender==='여'&&r.gender!=='여')return false;
  const g=gl(r.birth_year);if(!g||!S.ages.has(g))return false;
  if(!S.regs.has(r.region))return false;
  return true;
});}

function buildAges(){
  const el=document.getElementById('ageChecks');el.innerHTML='';
  AGS.forEach(g=>{
    const tot=RAW.filter(r=>r.birth_year>=g.n&&r.birth_year<=g.x).length;
    const item=document.createElement('label');item.className='chk-item';
    item.innerHTML=`<input type="checkbox" value="${g.l}" ${S.ages.has(g.l)?'checked':''}><div class="chk-box"></div><span class="chk-lbl">${g.l}</span><span class="chk-cnt">${tot}</span>`;
    item.querySelector('input').addEventListener('change',e=>{if(e.target.checked)S.ages.add(g.l);else S.ages.delete(g.l);render();});
    el.appendChild(item);
  });
}
function buildRegs(){
  const el=document.getElementById('rChips');el.innerHTML='';
  REGS.forEach(r=>{
    const c=document.createElement('div');c.className='rchip'+(S.regs.has(r)?' on':'');
    c.textContent=r;c.dataset.r=r;
    c.addEventListener('click',()=>{if(S.regs.has(r))S.regs.delete(r);else S.regs.add(r);c.classList.toggle('on',S.regs.has(r));render();});
    el.appendChild(c);
  });
}

function rKPI(d){
  const tot=d.length,m=d.filter(r=>r.gender==='남').length,f=d.filter(r=>r.gender==='여').length;
  document.getElementById('kTot').textContent=tot;
  document.getElementById('kTotSub').textContent=`${S.from.slice(5)} ~ ${S.to.slice(5)}`;
  document.getElementById('kM').textContent=m;
  document.getElementById('kMp').textContent=tot>0?`${(m/tot*100).toFixed(1)}%`:'-';
  document.getElementById('kF').textContent=f;
  document.getElementById('kFp').textContent=tot>0?`${(f/tot*100).toFixed(1)}%`:'-';
  const rc={};d.forEach(r=>{rc[r.region]=(rc[r.region]||0)+1;});
  const top=Object.entries(rc).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('kReg').textContent=top?top[0]:'-';
  document.getElementById('kRegS').textContent=top?`${top[1]}명`:'-';
}
function rBF(d){
  const el=document.getElementById('bf');el.innerHTML='';
  const mx=Math.max(1,...AGS.map(g=>{const ig=d.filter(r=>gl(r.birth_year)===g.l);return Math.max(ig.filter(r=>r.gender==='남').length,ig.filter(r=>r.gender==='여').length);}));
  AGS.forEach(g=>{
    const ig=d.filter(r=>gl(r.birth_year)===g.l);
    const m=ig.filter(r=>r.gender==='남').length,f=ig.filter(r=>r.gender==='여').length;
    const mw=Math.max(2,Math.round(m/mx*110)),fw=Math.max(2,Math.round(f/mx*110));
    const row=document.createElement('div');row.className='bfrow';
    row.innerHTML=`<div class="bfage">${g.l.replace('년생','')}</div>
      <div class="bfleft"><span class="bn ${m>0?'m':'z'}">${m}</span><div class="bm" style="width:${m>0?mw:2}px;opacity:${m>0?.75:.12}"></div></div>
      <div class="bfright"><div class="bf" style="width:${f>0?fw:2}px;opacity:${f>0?.75:.12}"></div><span class="bn ${f>0?'f':'z'}">${f}</span></div>`;
    el.appendChild(row);
  });
}
function rSC(d){
  const el=document.getElementById('sc');el.innerHTML='';
  const mx=Math.max(1,...AGS.map(g=>d.filter(r=>gl(r.birth_year)===g.l).length));
  AGS.forEach(g=>{
    const ig=d.filter(r=>gl(r.birth_year)===g.l);
    const m=ig.filter(r=>r.gender==='남').length,f=ig.filter(r=>r.gender==='여').length,tot=m+f;
    const mp=tot>0?Math.round(m/tot*100):0;
    const bw=tot>0?Math.max(4,Math.round(tot/mx*100)):4;
    const row=document.createElement('div');row.className='scrow';
    row.innerHTML=`<div class="sctop"><span class="scage">${g.l}</span><span class="sctot">${tot}명</span></div>
      <div class="scbar" style="width:${bw}%"><div class="scm" style="width:${mp}%"></div><div class="scf" style="width:${100-mp}%"></div></div>
      <div class="scprow"><span class="scpct m">${mp}%</span><span class="scpct f">${100-mp}%</span></div>`;
    el.appendChild(row);
  });
}
function rRB(d){
  const el=document.getElementById('rb');el.innerHTML='';
  const byR={};REGS.forEach(r=>{byR[r]={m:0,f:0};});
  d.forEach(r=>{if(byR[r.region]){if(r.gender==='남')byR[r.region].m++;else byR[r.region].f++;}});
  const sorted=REGS.map(r=>({r,m:byR[r].m,f:byR[r].f,tot:byR[r].m+byR[r].f})).filter(x=>x.tot>0).sort((a,b)=>b.tot-a.tot);
  const mx=Math.max(1,...sorted.map(x=>x.tot));
  sorted.forEach(x=>{
    const mw=Math.round(x.m/mx*150),fw=Math.round(x.f/mx*150);
    const row=document.createElement('div');row.className='rbrow';
    row.innerHTML=`<div class="rbname">${x.r}</div><div class="rbbars"><div class="rbm" style="width:${mw}px"></div><div class="rbf" style="width:${fw}px"></div></div><div class="rbcnt">${x.tot}</div>`;
    el.appendChild(row);
  });
  if(!sorted.length)el.innerHTML='<div style="color:var(--g400);font-size:12px;padding:8px 0">데이터 없음</div>';
}
function rTrend(d){
  const cv=document.getElementById('tc'),wp=cv.parentElement;
  cv.width=wp.clientWidth||800;cv.height=130;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
  const dates=[];let dd=new Date(S.from),end=new Date(S.to);
  while(dd<=end){dates.push(dd.toISOString().slice(0,10));dd=new Date(dd.getTime()+86400000);}
  if(!dates.length)return;
  const cm={},cf={};dates.forEach(dt=>{cm[dt]=0;cf[dt]=0;});
  d.forEach(r=>{if(cm[r.date]!==undefined){if(r.gender==='남')cm[r.date]++;else cf[r.date]++;}});
  const mx=Math.max(1,...dates.map(dt=>cm[dt]+cf[dt]));
  const W=cv.width,H=cv.height,pL=28,pR=8,pT=8,pB=22;
  const cW=W-pL-pR,cH=H-pT-pB,bW=Math.max(4,Math.floor(cW/dates.length)-2);
  ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pT+cH*(1-i/4);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();
    ctx.fillStyle='#bbb';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(mx*i/4),pL-3,y+3);
  }
  dates.forEach((dt,i)=>{
    const x=pL+(cW/dates.length)*i+(cW/dates.length-bW)/2;
    const m=cm[dt],f=cf[dt],tot=m+f;
    if(!tot){ctx.fillStyle='#f0f0f0';ctx.fillRect(x,pT+cH-2,bW,2);return;}
    const th=Math.round(tot/mx*cH),mh=Math.round(m/tot*th),fh=th-mh,by=pT+cH;
    if(mh>0){ctx.fillStyle='rgba(59,111,196,.7)';ctx.fillRect(x,by-th,bW,mh);}
    if(fh>0){ctx.fillStyle='rgba(181,80,106,.7)';ctx.fillRect(x,by-fh,bW,fh);}
    ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(dt.slice(5),x+bW/2,H-4);
  });
}
function rTable(d){
  const tb=document.getElementById('tbody');tb.innerHTML='';
  let gM=0,gF=0;
  AGS.forEach(g=>{
    const ig=d.filter(r=>gl(r.birth_year)===g.l);
    const m=ig.filter(r=>r.gender==='남').length,f=ig.filter(r=>r.gender==='여').length,tot=m+f;
    gM+=m;gF+=f;
    const mp=tot>0?Math.round(m/tot*100):0;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="age">${g.l}</td><td class="mv">${m}</td><td class="fv">${f}</td><td class="r">${tot}</td>
      <td class="ratw"><div class="rattxt">${mp}% : ${100-mp}%</div><div class="ratbar"><div class="ratfill" style="width:${mp}%"></div></div></td>`;
    tb.appendChild(tr);
  });
  const gt=gM+gF,gp=gt>0?Math.round(gM/gt*100):0;
  const tf=document.createElement('tr');tf.style.cssText='background:var(--g50);font-weight:700;';
  tf.innerHTML=`<td class="age">합계</td><td class="mv">${gM}</td><td class="fv">${gF}</td><td class="r">${gt}</td>
    <td class="ratw"><div class="rattxt">${gp}% : ${100-gp}%</div><div class="ratbar"><div class="ratfill" style="width:${gp}%"></div></div></td>`;
  tb.appendChild(tf);
}
function rSum(d){
  const tot=d.length,m=d.filter(r=>r.gender==='남').length,f=d.filter(r=>r.gender==='여').length;
  document.getElementById('sbSum').innerHTML=`
    <div class="sum-row"><span class="sum-k">총 주문</span><span class="sum-v">${tot}건</span></div>
    <div class="sum-row"><span class="sum-k">남성</span><span class="sum-v m">${m}명</span></div>
    <div class="sum-row"><span class="sum-k">여성</span><span class="sum-v f">${f}명</span></div>
    <div class="sum-row"><span class="sum-k">지역</span><span class="sum-v">${S.regs.size}개</span></div>`;
}
function rTags(){
  const el=document.getElementById('ftags');el.innerHTML='';
  const gl2=S.gender==='all'?'전체':S.gender==='남'?'남성':'여성';
  [`${S.from.slice(5)}~${S.to.slice(5)}`,gl2,`연령 ${S.ages.size}개`,`지역 ${S.regs.size}개`].forEach(t=>{
    const s=document.createElement('span');s.className='tag';s.textContent=t;el.appendChild(s);
  });
}
function render(){
  const d=gf();
  rKPI(d);rBF(d);rSC(d);rRB(d);rTrend(d);rTable(d);rSum(d);rTags();
}

document.getElementById('dateFrom').addEventListener('change',e=>{S.from=e.target.value;document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('on'));render();});
document.getElementById('dateTo').addEventListener('change',e=>{S.to=e.target.value;document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('on'));render();});
document.querySelectorAll('.qbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
    const today=new Date('2026-03-19');
    if(btn.dataset.r==='all'){S.from='2026-03-11';S.to='2026-03-19';}
    else{const f=new Date(today.getTime()-(parseInt(btn.dataset.r)-1)*86400000);S.from=f.toISOString().slice(0,10);S.to='2026-03-19';}
    document.getElementById('dateFrom').value=S.from;document.getElementById('dateTo').value=S.to;render();
  });
});
['gAll','gMale','gFemale'].forEach(id=>{
  document.getElementById(id).addEventListener('click',()=>{
    S.gender=id==='gAll'?'all':id==='gMale'?'남':'여';
    document.getElementById('gAll').className='gbtn'+(S.gender==='all'?' aa':'');
    document.getElementById('gMale').className='gbtn'+(S.gender==='남'?' am':'');
    document.getElementById('gFemale').className='gbtn'+(S.gender==='여'?' af':'');
    render();
  });
});
document.getElementById('rAllBtn').addEventListener('click',()=>{
  const allOn=S.regs.size===REGS.length;
  S.regs=allOn?new Set():new Set(REGS);
  buildRegs();render();
});
window.addEventListener('resize',()=>rTrend(gf()));

buildAges();buildRegs();render();
</script>
